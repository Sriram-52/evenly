name: Release

# Builds the Android APK on EAS cloud (not the slow GitHub runner), then
# downloads the artifact and publishes it to GitHub Releases.
# Run manually from the Actions tab.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (optional; defaults to build-<run#>)"
        required: false
        type: string

permissions:
  contents: write # create releases + upload the APK asset

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        # eas build evaluates the app config (config plugins, fingerprint)
        # locally before uploading to EAS, so node_modules must be present —
        # even though the actual Gradle compile runs on EAS cloud.
        run: pnpm install --frozen-lockfile

      - name: Read app version
        id: ver
        run: echo "version=$(node -p "require('./app.json').expo.version")" >> "$GITHUB_OUTPUT"

      - name: Build APK on EAS cloud and download
        env:
          EAS_BUILD_NO_EXPO_GO_WARNING: "true"
        run: |
          # Compiles on EAS (the runner only waits); --json gives us the build object.
          eas build --platform android --profile production --non-interactive --wait --json > build.json
          URL=$(node -e 'const b=require("./build.json");const x=Array.isArray(b)?b[0]:b;process.stdout.write(x.artifacts?.applicationArchiveUrl||x.artifacts?.buildUrl||"")')
          if [ -z "$URL" ]; then echo "Could not resolve APK URL"; cat build.json; exit 1; fi
          echo "Downloading $URL"
          curl -fL -o "evenly-v${{ steps.ver.outputs.version }}.apk" "$URL"

      - name: Resolve release tag
        id: meta
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then TAG="build-${{ github.run_number }}"; fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Evenly ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: evenly-v${{ steps.ver.outputs.version }}.apk
