name: Build & Release Android

# Builds the Android APK on the GitHub runner via `eas build --local`
# (reuses the eas.json `production` profile + EAS-managed signing keystore),
# then publishes it to GitHub Releases.
# Run manually from the Actions tab.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (optional; defaults to build-<run#>)"
        required: false
        type: string

permissions:
  contents: write # create releases + upload the APK asset

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Set up Java (Android Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'app.json') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build APK locally
        run: |
          eas build \
            --platform android \
            --profile production \
            --local \
            --non-interactive \
            --output "${{ github.workspace }}/evenly.apk"

      - name: Resolve release tag
        id: meta
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then TAG="build-${{ github.run_number }}"; fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=Evenly $TAG" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          generate_release_notes: true
          files: ${{ github.workspace }}/evenly.apk
