name: Create Production Builds

# Cloud build only. Releasing the APK is handled by the GitHub Actions
# workflow (.github/workflows/release.yml), which builds locally and publishes.
# Run on demand: `eas workflow:run create-production-builds.yml`

jobs:
  build_android:
    name: Build Android APK
    type: build # creates a production build for Android
    params:
      platform: android
      profile: production
