name: Create Production Builds

# EAS cloud build of the Android APK. Run on demand:
#   eas workflow:run create-production-builds.yml
# or directly:  eas build -p android --profile production
# Download the resulting APK from the EAS build page (or attach it to a
# GitHub Release manually when you want public distribution).

jobs:
  build_android:
    name: Build Android APK
    type: build # creates a production build for Android
    params:
      platform: android
      profile: production
